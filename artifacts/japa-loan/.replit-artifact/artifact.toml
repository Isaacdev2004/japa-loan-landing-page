kind = "web"
previewPath = "/"
title = "Japa Loan — Pareto Finance"
version = "1.0.0"
id = "artifacts/japa-loan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21049

[services.development]
run = "pnpm --filter @workspace/japa-loan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/japa-loan", "run", "build" ]
publicDir = "artifacts/japa-loan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21049"
BASE_PATH = "/"
